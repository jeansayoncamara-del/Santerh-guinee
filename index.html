<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>SantéRH Guinée</title>
<style>
:root{
  --vert:#1E7C3C;
  --vert-fonce:#155A2C;
  --bleu:#1E5AA8;
  --rouge:#CE1126;
  --jaune:#FCD116;
  --gris-fond:#F4F6F5;
  --gris-bord:#E1E6E4;
  --texte:#1B2721;
  --texte-clair:#6B7A72;
  --blanc:#FFFFFF;
  --radius:14px;
  --shadow:0 4px 18px rgba(20,40,30,0.08);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
  background:var(--gris-fond);
  color:var(--texte);
  -webkit-tap-highlight-color:transparent;
}
img{max-width:100%;}
button{font-family:inherit; cursor:pointer;}
input,select{font-family:inherit;}

/* ---------- SPLASH / LOGIN ---------- */
#screen-login{
  min-height:100vh;
  background:linear-gradient(180deg,#EAF3FB 0%, #F7FBF9 55%, var(--gris-fond) 100%);
  display:flex; flex-direction:column; align-items:center;
  padding:32px 20px 24px;
}
.brand-mark{
  width:96px; height:96px; border-radius:50%;
  background:var(--blanc);
  display:flex; align-items:center; justify-content:center;
  box-shadow:var(--shadow);
  margin-top:18px;
  font-size:40px;
}
.brand-title{
  margin-top:16px; text-align:center;
  font-size:30px; font-weight:800; color:var(--vert);
  letter-spacing:-0.5px;
}
.brand-title span{color:var(--bleu);}
.brand-sub{
  color:var(--rouge); font-weight:700; font-size:20px; margin-top:-4px;
}
.brand-tag{
  margin-top:10px; text-align:center; color:var(--texte-clair);
  font-size:14px; max-width:320px; line-height:1.4;
}
.login-card{
  width:100%; max-width:380px;
  background:var(--blanc);
  border-radius:20px;
  box-shadow:var(--shadow);
  padding:24px 22px 20px;
  margin-top:26px;
}
.login-card h2{
  font-size:17px; display:flex; align-items:center; gap:8px;
  color:var(--texte); margin-bottom:16px;
}
.field{
  display:flex; align-items:center; gap:8px;
  border:1.5px solid var(--gris-bord); border-radius:10px;
  padding:11px 12px; margin-bottom:12px; background:#FBFCFB;
}
.field input, .field select{
  border:none; outline:none; background:transparent; flex:1; font-size:15px; color:var(--texte);
}
.field .icon{font-size:16px; opacity:0.6;}
.field .toggle-eye{cursor:pointer; opacity:0.5; font-size:14px;}
.row-between{display:flex; justify-content:space-between; align-items:center; font-size:13px; margin:6px 0 16px;}
.row-between label{display:flex; align-items:center; gap:6px; color:var(--texte-clair);}
.link{color:var(--vert); text-decoration:none; font-weight:600;}
.btn-primary{
  width:100%; background:var(--vert); color:#fff; border:none;
  border-radius:10px; padding:13px; font-size:15px; font-weight:700;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-primary:active{background:var(--vert-fonce);}
.divider-or{
  text-align:center; color:var(--texte-clair); font-size:12px; margin:14px 0;
  position:relative;
}
.divider-or::before,.divider-or::after{
  content:""; position:absolute; top:50%; width:40%; height:1px; background:var(--gris-bord);
}
.divider-or::before{left:0;} .divider-or::after{right:0;}
.btn-outline{
  width:100%; background:#fff; color:var(--vert); border:1.5px solid var(--vert);
  border-radius:10px; padding:12px; font-size:14px; font-weight:700;
}
.version-tag{margin-top:14px; color:var(--texte-clair); font-size:12px; text-align:center;}
.login-error{
  background:#FDECEC; color:var(--rouge); border-radius:8px; padding:9px 12px;
  font-size:13px; margin-bottom:10px; display:none;
}
.footer-flag{
  margin-top:auto; width:100%; height:10px; display:flex;
}
.footer-flag div{flex:1;}

/* ---------- APP SHELL ---------- */
#app{display:none; min-height:100vh; flex-direction:column;}
.topbar{
  background:var(--blanc); border-bottom:1px solid var(--gris-bord);
  padding:12px 16px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:20;
}
.topbar .tb-left{display:flex; align-items:center; gap:10px;}
.tb-logo{width:34px; height:34px; border-radius:50%; background:var(--gris-fond); display:flex; align-items:center; justify-content:center; font-size:16px;}
.tb-title{font-weight:800; color:var(--vert); font-size:16px;}
.tb-title span{color:var(--bleu);}
.tb-right{display:flex; align-items:center; gap:10px;}
.sync-dot{width:9px; height:9px; border-radius:50%; background:#3CB371;}
.sync-dot.off{background:#C0392B;}
.btn-icon{
  background:var(--gris-fond); border:none; border-radius:8px; padding:7px 9px; font-size:15px;
}
.centre-select{
  border:1px solid var(--gris-bord); border-radius:8px; padding:7px 8px; font-size:12.5px; max-width:150px; background:#fff;
}
.content{padding:14px 14px 90px; flex:1;}
.section-title{font-size:18px; font-weight:800; margin-bottom:4px;}
.section-sub{color:var(--texte-clair); font-size:13px; margin-bottom:14px;}

/* Dashboard cards */
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
.stat-card{
  background:#fff; border-radius:var(--radius); padding:14px; box-shadow:var(--shadow);
}
.stat-card .num{font-size:24px; font-weight:800;}
.stat-card .lbl{font-size:12px; color:var(--texte-clair); margin-top:2px;}
.stat-card.v{border-left:4px solid var(--vert);}
.stat-card.b{border-left:4px solid var(--bleu);}
.stat-card.r{border-left:4px solid var(--rouge);}
.stat-card.j{border-left:4px solid #D4A017;}

.card{background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:14px; margin-bottom:12px;}
.card h3{font-size:14.5px; margin-bottom:10px; display:flex; align-items:center; gap:6px;}

.list-item{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:10px 0; border-bottom:1px solid #F0F2F1;
}
.list-item:last-child{border-bottom:none;}
.avatar{
  width:38px; height:38px; border-radius:50%; background:var(--gris-fond);
  display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--vert); font-size:14px; flex-shrink:0;
}
.li-main{flex:1; min-width:0;}
.li-name{font-weight:700; font-size:14px;}
.li-sub{font-size:12px; color:var(--texte-clair); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.badge{padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap;}
.badge.present{background:#E3F6E9; color:#1E7C3C;}
.badge.absent{background:#FDECEC; color:#CE1126;}
.badge.retard{background:#FFF6DE; color:#B8860B;}
.badge.approuve{background:#E3F6E9; color:#1E7C3C;}
.badge.attente{background:#FFF6DE; color:#B8860B;}
.badge.refuse{background:#FDECEC; color:#CE1126;}
.badge.actif{background:#E7F0FB; color:#1E5AA8;}
.badge.mission{background:#E7F0FB; color:#1E5AA8;}
.badge.conge{background:#F3E8FD; color:#7B2FBE;}

/* FAB + bottom nav */
.fab{
  position:fixed; right:18px; bottom:82px; width:54px; height:54px; border-radius:50%;
  background:var(--vert); color:#fff; border:none; font-size:26px; box-shadow:0 6px 16px rgba(30,124,60,0.4);
  z-index:30;
}
.bottom-nav{
  position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--gris-bord);
  display:flex; z-index:25; padding:6px 4px 8px;
}
.nav-btn{
  flex:1; border:none; background:none; display:flex; flex-direction:column; align-items:center; gap:2px;
  font-size:10.5px; color:var(--texte-clair); padding:6px 2px; border-radius:10px;
}
.nav-btn .ic{font-size:19px;}
.nav-btn.active{color:var(--vert); font-weight:700;}

/* Search / filter bar */
.searchbar{display:flex; gap:8px; margin-bottom:12px;}
.searchbar input{flex:1; border:1px solid var(--gris-bord); border-radius:10px; padding:10px 12px; font-size:14px; background:#fff;}
.chip-row{display:flex; gap:6px; overflow-x:auto; margin-bottom:12px; padding-bottom:2px;}
.chip{
  border:1px solid var(--gris-bord); background:#fff; border-radius:20px; padding:6px 12px;
  font-size:12.5px; white-space:nowrap; color:var(--texte-clair);
}
.chip.active{background:var(--vert); color:#fff; border-color:var(--vert);}

/* Modal */
.modal-overlay{
  display:none; position:fixed; inset:0; background:rgba(15,25,20,0.45); z-index:50;
  align-items:flex-end; justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal-sheet{
  background:#fff; width:100%; max-width:480px; border-radius:20px 20px 0 0;
  max-height:88vh; overflow-y:auto; padding:20px 18px 26px;
}
.modal-sheet h2{font-size:17px; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center;}
.modal-sheet .close-x{background:var(--gris-fond); border:none; border-radius:50%; width:30px; height:30px; font-size:15px;}
.form-group{margin-bottom:12px;}
.form-group label{font-size:12.5px; color:var(--texte-clair); display:block; margin-bottom:5px; font-weight:600;}
.form-group input, .form-group select, .form-group textarea{
  width:100%; border:1.5px solid var(--gris-bord); border-radius:9px; padding:10px 11px; font-size:14.5px; outline:none;
}
.form-group textarea{resize:vertical; min-height:60px;}
.form-row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.modal-actions{display:flex; gap:10px; margin-top:16px;}
.btn-secondary{flex:1; background:var(--gris-fond); border:none; border-radius:10px; padding:12px; font-weight:700; color:var(--texte);}
.btn-danger{background:#FDECEC; color:var(--rouge); border:none; border-radius:10px; padding:12px; font-weight:700;}

.empty-state{text-align:center; padding:36px 12px; color:var(--texte-clair);}
.empty-state .ic{font-size:38px; margin-bottom:8px;}

.toast{
  position:fixed; bottom:96px; left:50%; transform:translateX(-50%);
  background:#20302A; color:#fff; padding:11px 18px; border-radius:30px; font-size:13.5px;
  z-index:60; display:none; box-shadow:0 6px 16px rgba(0,0,0,0.25);
}

.att-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-top:8px;}
.att-btn{border:1.5px solid var(--gris-bord); background:#fff; border-radius:9px; padding:8px 4px; font-size:11.5px; font-weight:700; color:var(--texte-clair);}
.att-btn.sel-present{background:#E3F6E9; border-color:#1E7C3C; color:#1E7C3C;}
.att-btn.sel-absent{background:#FDECEC; border-color:#CE1126; color:#CE1126;}
.att-btn.sel-retard{background:#FFF6DE; border-color:#B8860B; color:#B8860B;}

.print-only{display:none;}
@media print{
  body > *:not(#printArea){display:none !important;}
  #printArea{display:block !important; position:static;}
}
#printArea{display:none;}

.scan-btn{
  width:100%; background:var(--bleu); color:#fff; border:none; border-radius:12px;
  padding:14px; font-size:15px; font-weight:700; margin-bottom:14px;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.scan-video-wrap{
  position:relative; border-radius:14px; overflow:hidden; background:#000; margin-bottom:12px;
}
.scan-video-wrap video{width:100%; display:block;}
.scan-frame{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:62%; aspect-ratio:1/1; border:3px solid #3CB371; border-radius:16px;
  box-shadow:0 0 0 999px rgba(0,0,0,0.35);
}
.scan-status{
  text-align:center; padding:10px; border-radius:10px; font-size:14px; font-weight:600;
  background:#F0F2F1; color:var(--texte-clair); margin-bottom:10px;
}
.scan-status.ok{background:#E3F6E9; color:#1E7C3C;}
.scan-status.err{background:#FDECEC; color:#CE1126;}
.badge-qr-box{
  display:flex; flex-direction:column; align-items:center; padding:14px;
  border:1.5px dashed var(--gris-bord); border-radius:14px; margin-bottom:14px;
}
.badge-qr-box .bq-name{font-weight:800; font-size:16px; margin-top:10px;}
.badge-qr-box .bq-sub{font-size:12.5px; color:var(--texte-clair);}
.gps-tag{font-size:10.5px; color:var(--bleu); display:inline-flex; align-items:center; gap:3px; margin-left:6px;}
.rank-item{display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid #F0F2F1;}
.rank-item:last-child{border-bottom:none;}
.rank-num{
  width:30px; height:30px; border-radius:50%; background:var(--gris-fond); color:var(--texte-clair);
  display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; flex-shrink:0;
}
.rank-num.gold{background:#FFF3CD; color:#B8860B;}
.rank-num.silver{background:#E8EAED; color:#5F6368;}
.rank-num.bronze{background:#F5DCC8; color:#A0522D;}
.rank-score{font-weight:800; font-size:16px; color:var(--vert);}
.mini-link{color:var(--bleu); font-size:12.5px; font-weight:700; background:none; border:none; padding:0;}
.act-row{display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #F0F2F1; font-size:13px;}
.act-row:last-child{border-bottom:none;}
</style>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="screen-login">
  <div class="brand-mark">🏥</div>
  <div class="brand-title">Santé<span>RH</span></div>
  <div class="brand-sub">Guinée</div>
  <div class="brand-tag">Une gestion moderne et efficace du personnel de santé, à l'échelle du district.</div>

  <div class="login-card">
    <h2>👤 Se connecter</h2>
    <div class="login-error" id="loginError"></div>
    <div class="field">
      <span class="icon">👤</span>
      <input type="text" id="loginUser" placeholder="Nom d'utilisateur" autocomplete="username">
    </div>
    <div class="field">
      <span class="icon">🔒</span>
      <input type="password" id="loginPass" placeholder="Mot de passe / PIN" autocomplete="current-password">
      <span class="toggle-eye" onclick="togglePass()">👁️</span>
    </div>
    <div class="row-between">
      <label><input type="checkbox" id="rememberMe" checked> Se souvenir de moi</label>
      <a href="#" class="link" onclick="alert('Contactez l\'administrateur district pour réinitialiser votre mot de passe.'); return false;">Mot de passe oublié ?</a>
    </div>
    <button class="btn-primary" onclick="doLogin()">➡️ SE CONNECTER</button>
    <div class="divider-or">OU</div>
    <button class="btn-outline" onclick="doOfflineLogin()">📶 UTILISER HORS LIGNE</button>
    <div class="version-tag">Version 1.0.0</div>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-logo">🏥</div>
      <div>
        <div class="tb-title">Santé<span>RH</span></div>
      </div>
    </div>
    <div class="tb-right">
      <select id="centreSelect" class="centre-select" onchange="onCentreChange()"></select>
      <span class="sync-dot" id="syncDot" title="Synchronisé"></span>
      <button class="btn-icon" onclick="logout()">⎋</button>
    </div>
  </div>

  <div class="content" id="content">
    <!-- injected per view -->
  </div>

  <button class="fab" id="fabBtn" onclick="handleFab()">＋</button>

  <div class="bottom-nav">
    <button class="nav-btn active" data-view="dashboard" onclick="showView('dashboard')"><span class="ic">🏠</span>Accueil</button>
    <button class="nav-btn" data-view="personnel" onclick="showView('personnel')"><span class="ic">👥</span>Personnel</button>
    <button class="nav-btn" data-view="presences" onclick="showView('presences')"><span class="ic">🕒</span>Présences</button>
    <button class="nav-btn" data-view="conges" onclick="showView('conges')"><span class="ic">📅</span>Congés</button>
    <button class="nav-btn" data-view="rapports" onclick="showView('rapports')"><span class="ic">📊</span>Rapports</button>
    <button class="nav-btn" data-view="merite" onclick="showView('merite')"><span class="ic">🏅</span>Mérite</button>
  </div>
</div>

<!-- ============ MODAL (générique) ============ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet" id="modalSheet"></div>
</div>

<div class="toast" id="toast"></div>
<div id="printArea"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
/* ==========================================================================
   SantéRH Guinée — Application de gestion du personnel de santé (niveau district)
   Architecture : fichier unique + Firebase Realtime Database + cache localStorage
   ========================================================================== */

/* ---------------------- 1. CONFIGURATION FIREBASE ----------------------- */
// Renseignez ici la config de VOTRE projet Firebase (Console Firebase > Paramètres du projet).
// Tant que apiKey reste vide, l'application fonctionne en mode 100% local (localStorage),
// ce qui permet de tester/utiliser hors ligne dès maintenant.
const firebaseConfig = {
  apiKey: "AIzaSyCAnYxH3FJ-ZI8TC2Ioyj_ayFGeEV3la2E",
  authDomain: "santerhguinee.firebaseapp.com",
  databaseURL: "https://santerhguinee-default-rtdb.firebaseio.com",
  projectId: "santerhguinee",
};

let fbApp = null, fbDb = null, FIREBASE_ON = false;
try {
  if (firebaseConfig.apiKey && firebaseConfig.databaseURL) {
    fbApp = firebase.initializeApp(firebaseConfig);
    fbDb = firebase.database();
    FIREBASE_ON = true;
  }
} catch (e) { console.warn("Firebase non initialisé :", e); FIREBASE_ON = false; }

/* ---------------------- 2. ÉTAT GLOBAL ----------------------------------- */
const LS_KEY = "santerh_gn_db_v1";
const LS_SESSION = "santerh_gn_session_v1";

let DB = { centres: {}, personnel: {}, presences: {}, conges: {}, users: {}, activites: {} };
const DOMAINES_ACTIVITE = [
  "Centre de santé",
  "Hôpital",
  "Direction",
  "Campagne de vaccination",
  "Surveillance des équipes",
  "Autre"
];
let SESSION = null;        // { username, role, nom, centreId }
let currentView = "dashboard";
let currentCentreFilter = "ALL"; // 'ALL' pour vue district (admin)
let presenceDate = todayISO();
let editingId = null;

/* ---------------------- 3. UTILITAIRES ------------------------------------ */
function todayISO(){ return new Date().toISOString().slice(0,10); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function fmtDate(iso){
  if(!iso) return "—";
  const [y,m,d] = iso.split("-");
  return `${d}/${m}/${y}`;
}
function initials(nom, prenom){
  return ((prenom?prenom[0]:"") + (nom?nom[0]:"")).toUpperCase() || "?";
}
function nowHM(){
  const d = new Date();
  return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
}
// Distance en mètres entre deux points GPS (formule de Haversine)
function distanceMetres(lat1, lng1, lat2, lng2){
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
// Un pointage peut être une simple chaîne (ancien format) ou un objet enrichi {statut, heure, methode, lat, lng}
function presenceStatut(entry){
  if(!entry) return null;
  return typeof entry === "string" ? entry : entry.statut;
}
function presenceMeta(entry){
  if(!entry || typeof entry === "string") return null;
  return entry;
}
window.addEventListener("error", (e)=>{
  console.warn("Erreur JS interceptée :", e.message);
  toast("⚠️ Erreur : " + e.message);
});
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>{ t.style.display="none"; }, 2400);
}
function openModal(html){
  document.getElementById("modalSheet").innerHTML = html;
  document.getElementById("modalOverlay").classList.add("open");
}
function closeModal(){
  document.getElementById("modalOverlay").classList.remove("open");
  editingId = null;
}
document.getElementById("modalOverlay").addEventListener("click", (e)=>{
  if(e.target.id === "modalOverlay") closeModal();
});
function togglePass(){
  const f = document.getElementById("loginPass");
  f.type = f.type === "password" ? "text" : "password";
}

/* ---------------------- 4. PERSISTANCE (local + Firebase) ----------------- */
let MEMORY_DB_FALLBACK = null; // secours si localStorage est bloqué (ex: fichier ouvert en file://)
function saveLocal(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify(DB));
  }catch(e){
    console.warn("localStorage indisponible, sauvegarde en mémoire seulement :", e);
    MEMORY_DB_FALLBACK = JSON.parse(JSON.stringify(DB));
    toast("⚠️ Stockage local bloqué (ouvrez le fichier via un lien web, pas en local)");
  }
}
function loadLocal(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ DB = JSON.parse(raw); }
  }catch(e){
    console.warn("localStorage indisponible au chargement :", e);
    if(MEMORY_DB_FALLBACK){ DB = MEMORY_DB_FALLBACK; }
  }
  if(!DB.activites) DB.activites = {};
}
function pushToFirebase(){
  if(!FIREBASE_ON) return;
  fbDb.ref("santerh").set(DB).then(()=>{
    setSyncStatus(true);
  }).catch(err=>{ console.warn(err); setSyncStatus(false); });
}
function setSyncStatus(ok){
  const dot = document.getElementById("syncDot");
  if(!dot) return;
  dot.classList.toggle("off", !ok);
  dot.title = ok ? "Synchronisé avec le serveur" : "Hors ligne — données stockées localement";
}
function persist(){
  saveLocal();
  pushToFirebase();
}
function listenFirebase(){
  if(!FIREBASE_ON) { setSyncStatus(false); return; }
  fbDb.ref("santerh").on("value", (snap)=>{
    const data = snap.val();
    if(data){
      DB = data;
      if(!DB.activites) DB.activites = {};
      saveLocal();
      renderAll();
    } else {
      // Première utilisation : on pousse les données locales (seed) vers Firebase
      pushToFirebase();
    }
    setSyncStatus(true);
  }, (err)=>{ console.warn(err); setSyncStatus(false); });
  window.addEventListener("online", ()=> setSyncStatus(true));
  window.addEventListener("offline", ()=> setSyncStatus(false));
}

/* ---------------------- 6. AUTHENTIFICATION -------------------------------- */
function doLogin(){
  const u = document.getElementById("loginUser").value.trim();
  const p = document.getElementById("loginPass").value;
  const errBox = document.getElementById("loginError");
  errBox.style.display = "none";

  const user = DB.users[u];
  if(!user || user.password !== p){
    errBox.textContent = "Nom d'utilisateur ou mot de passe incorrect.";
    errBox.style.display = "block";
    return;
  }
  SESSION = { username:u, role:user.role, nom:user.nom, centreId:user.centreId };
  if(document.getElementById("rememberMe").checked){
    localStorage.setItem(LS_SESSION, JSON.stringify(SESSION));
  }
  enterApp();
}
function doOfflineLogin(){
  // Accès rapide hors-ligne avec le dernier profil connu, sinon admin par défaut
  const saved = localStorage.getItem(LS_SESSION);
  if(saved){ SESSION = JSON.parse(saved); }
  else { SESSION = { username:"admin", role:"admin", nom:"Administrateur District", centreId:null }; }
  enterApp();
}
function logout(){
  SESSION = null;
  localStorage.removeItem(LS_SESSION);
  document.getElementById("app").style.display = "none";
  document.getElementById("screen-login").style.display = "flex";
  document.getElementById("loginUser").value = "";
  document.getElementById("loginPass").value = "";
}
function enterApp(){
  document.getElementById("screen-login").style.display = "none";
  document.getElementById("app").style.display = "flex";
  currentCentreFilter = SESSION.role === "admin" ? "ALL" : SESSION.centreId;
  buildCentreSelect();
  showView("dashboard");
}

/* ---------------------- 7. SÉLECTEUR DE CENTRE ------------------------------ */
function buildCentreSelect(){
  const sel = document.getElementById("centreSelect");
  sel.innerHTML = "";
  if(SESSION.role === "admin"){
    const optAll = document.createElement("option");
    optAll.value = "ALL"; optAll.textContent = "Tous les centres";
    sel.appendChild(optAll);
  }
  Object.keys(DB.centres).forEach(id=>{
    if(SESSION.role !== "admin" && id !== SESSION.centreId) return;
    const o = document.createElement("option");
    o.value = id; o.textContent = DB.centres[id].nom;
    sel.appendChild(o);
  });

function onCentreChange(){
  currentCentreFilter = document.getElementById("centreSelect").value;
  renderAll();
}
function visiblePersonnelIds(){
  return Object.keys(DB.personnel).filter(id=>{
    const p = DB.personnel[id];
    return currentCentreFilter === "ALL" || p.centreId === currentCentreFilter;
  });
}

/* ---------------------- 8. NAVIGATION --------------------------------------- */
function showView(view){
  currentView = view;
  document.querySelectorAll(".nav-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.view === view);
  });
  renderAll();
}
function renderAll(){
  buildCentreSelect();

  else if(currentView === "presences") renderPresences();
  else if(currentView === "conges") renderConges();
  else if(currentView === "rapports") renderRapports();
  else if(currentView === "merite") renderMerite();
}
function handleFab(){
  if(currentView === "personnel") openPersonnelForm();

          <div class="avatar">${initials(p.nom,p.prenom)}</div>

            <div class="li-name">${p.prenom||""} ${p.nom||""}</div>

          </div>
          <span class="badge ${c.statut}">${c.statut==="attente"?"En attente":c.statut==="approuve"?"Approuvé":"Refusé"}</span>

function capturerPositionCentre(){
  const statusEl = document.getElementById("ct_gpsStatus");
  if(!navigator.geolocation){ statusEl.textContent = "GPS non disponible sur cet appareil."; return; }
  statusEl.textContent = "📡 Recherche de la position…";
  navigator.geolocation.getCurrentPosition(pos=>{
    document.getElementById("ct_lat").value = pos.coords.latitude.toFixed(6);
    document.getElementById("ct_lng").value = pos.coords.longitude.toFixed(6);
    statusEl.textContent = `✅ Position capturée (précision ≈ ${Math.round(pos.coords.accuracy)} m)`;
  }, err=>{
    statusEl.textContent = "❌ Impossible d'obtenir la position : " + err.message;
  }, { enableHighAccuracy:true, timeout:12000 });
}
function saveCentre(id){
  const nom = document.getElementById("ct_nom").value.trim();
  if(!nom){ toast("Le nom du centre est obligatoire."); return; }
  const latVal = document.getElementById("ct_lat").value;
  const lngVal = document.getElementById("ct_lng").value;
  DB.centres[id] = {
    nom,
    district: document.getElementById("ct_district").value.trim(),
    region: document.getElementById("ct_region").value.trim(),
    responsable: document.getElementById("ct_resp").value.trim(),
    telephone: document.getElementById("ct_tel").value.trim(),
    lat: latVal !== "" ? parseFloat(latVal) : null,
    lng: lngVal !== "" ? parseFloat(lngVal) : null,
    rayon: parseInt(document.getElementById("ct_rayon").value) || 150
  };
  persist();
  closeModal();
  toast("Centre enregistré ✅");
  renderAll();
}
function deleteCentre(id){
  if(Object.values(DB.personnel).some(p=>p.centreId===id)){
    toast("Impossible : des agents sont encore rattachés à ce centre.");

  if(!confirm("Supprimer ce centre ?")) return;
  delete DB.centres[id];
  persist();
  closeModal();
  toast("Centre supprimé");
  renderAll();
}

function setPresence(personnelId, statut){
  if(!DB.presences[presenceDate]) DB.presences[presenceDate] = {};
  const current = presenceStatut(DB.presences[presenceDate][personnelId]);
  if(current === statut){
    delete DB.presences[presenceDate][personnelId]; // toggle off
  } else {
    DB.presences[presenceDate][personnelId] = { statut, heure: nowHM(), methode: "manuel" };
  }
  persist();
  renderPresences();
}

/* ---------------------- 11bis. BADGE QR PERSONNEL ---------------------------- */
function ensureQrToken(personnelId){
  if(!DB.personnel[personnelId].qrToken){
    DB.personnel[personnelId].qrToken = uid();
    persist();
  }
  return DB.personnel[personnelId].qrToken;
}
function openBadgeModal(personnelId){
  const p = DB.personnel[personnelId];
  const token = ensureQrToken(personnelId);
  const payload = JSON.stringify({ i: personnelId, t: token });
  openModal(`
    <h2>Badge de pointage <button class="close-x" onclick="closeModal()">✕</button></h2>
    <div class="badge-qr-box">
      <div id="qrHolder"></div>
      <div class="bq-name">${p.prenom||""} ${p.nom||""}</div>
      <div class="bq-sub">${p.poste||""} · ${DB.centres[p.centreId]?.nom||""}</div>
    </div>
    <div class="section-sub" style="text-align:center;">Ce badge sert à pointer la présence automatiquement (scan + GPS). Imprimez-le et gardez-le sur vous, ou affichez-le depuis votre téléphone.</div>
    <button class="btn-primary" style="margin-top:10px;" onclick="imprimerBadge('${personnelId}')">🖨️ Imprimer ce badge</button>
  `);
  setTimeout(()=>{
    const holder = document.getElementById("qrHolder");
    if(holder && window.QRCode){
      holder.innerHTML = "";
      new QRCode(holder, { text: payload, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.M });
    }
  }, 30);
}
function imprimerBadge(personnelId){
  const p = DB.personnel[personnelId];
  const token = ensureQrToken(personnelId);

/* ---------------------- 11ter. SCANNER QR + VALIDATION GPS ------------------- */
let _scanStream = null, _scanLoopId = null, _scanCooldown = false;

function openScanner(){
  openModal(`
    <h2>Scanner un badge <button class="close-x" onclick="stopScanner()">✕</button></h2>
    <div class="scan-video-wrap">
      <video id="qrVideo" playsinline muted autoplay></video>
      <div class="scan-frame"></div>
    </div>
    <div class="scan-status" id="scanStatus">Placez le QR code de l'agent dans le cadre…</div>
    <button class="btn-secondary" style="width:100%;" onclick="stopScanner()">Fermer le scanner</button>
  `);
  startScannerCamera();
}
function startScannerCamera(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    document.getElementById("scanStatus").textContent = "Caméra non disponible sur cet appareil/navigateur.";
    return;
  }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream=>{
    _scanStream = stream;
    const video = document.getElementById("qrVideo");
    if(!video) { stopScanner(); return; }
    video.srcObject = stream;
    video.setAttribute("playsinline", "true");
    video.play();
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    function tick(){
      if(!_scanStream) return; // scanner fermé
      if(video.readyState === video.HAVE_ENOUGH_DATA && !_scanCooldown){
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = window.jsQR ? jsQR(imageData.data, imageData.width, imageData.height) : null;
        if(code && code.data){
          handleQrDecoded(code.data);
        }
      }
      _scanLoopId = requestAnimationFrame(tick);
    }
    _scanLoopId = requestAnimationFrame(tick);
  }).catch(err=>{
    const el = document.getElementById("scanStatus");
    if(el) el.textContent = "❌ Accès caméra refusé : " + err.message;
  });
}
function stopScanner(){
  if(_scanLoopId) cancelAnimationFrame(_scanLoopId);
  _scanLoopId = null;
  if(_scanStream){
    _scanStream.getTracks().forEach(t=>t.stop());
    _scanStream = null;
  }
  closeModal();
  renderPresences();
}
function handleQrDecoded(text){
  if(_scanCooldown) return;
  let payload;
  try{ payload = JSON.parse(text); } catch(e){ return; }
  if(!payload || !payload.i || !DB.personnel[payload.i]) return;
  const personnelId = payload.i;
  const p = DB.personnel[personnelId];
  if(p.qrToken && p.qrToken !== payload.t) return; // badge non reconnu

  _scanCooldown = true;
  const statusEl = document.getElementById("scanStatus");
  if(statusEl){ statusEl.className = "scan-status"; statusEl.textContent = `📡 Vérification de la position pour ${p.prenom||""} ${p.nom||""}…`; }

  const finishCooldown = ()=> setTimeout(()=>{ _scanCooldown = false; }, 2200);

  if(!navigator.geolocation){
    validerEtEnregistrerPresence(personnelId, null);
    finishCooldown();
    return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    validerEtEnregistrerPresence(personnelId, { lat: pos.coords.latitude, lng: pos.coords.longitude });
    finishCooldown();
  }, err=>{
    // GPS indisponible : on enregistre quand même mais sans coordonnées
    validerEtEnregistrerPresence(personnelId, null);
    finishCooldown();
  }, { enableHighAccuracy:true, timeout:10000 });
}
function validerEtEnregistrerPresence(personnelId, coords){
  const p = DB.personnel[personnelId];
  const centre = DB.centres[p.centreId];
  const statusEl = document.getElementById("scanStatus");

  if(centre && centre.lat != null && centre.lng != null && coords){
    const dist = distanceMetres(coords.lat, coords.lng, centre.lat, centre.lng);
    const rayon = centre.rayon || 150;
    if(dist > rayon){
      if(statusEl){
        statusEl.className = "scan-status err";
        statusEl.textContent = `❌ ${p.prenom||""} ${p.nom||""} est à ${Math.round(dist)} m du centre (rayon autorisé : ${rayon} m). Pointage refusé.`;
      }
      toast("Hors du périmètre du centre — pointage refusé");
      return;
    }
  }

  const heure = nowHM();
  const statut = heure > "08:30" ? "retard" : "present";
  if(!DB.presences[presenceDate]) DB.presences[presenceDate] = {};
  DB.presences[presenceDate][personnelId] = {
    statut, heure, methode: "qr",
    lat: coords ? coords.lat : null,
    lng: coords ? coords.lng : null
  };
  persist();

  if(statusEl){
    statusEl.className = "scan-status ok";
    statusEl.textContent = `✅ ${p.prenom||""} ${p.nom||""} — ${statut==="present"?"Présent":"Retard"} (${heure})`;
  }
  toast(`${p.prenom||""} ${p.nom||""} pointé(e) ✅`);
}

let rapportMonth = todayISO().slice(0,7); // YYYY-MM

  const ids = visiblePersonnelIds();

  // Agrégation présences du mois
  let joursComptes=0, totalPresent=0, totalAbsent=0, totalRetard=0;
  Object.entries(DB.presences).forEach(([date, dayData])=>{
    if(!date.startsWith(rapportMonth)) return;
    joursComptes++;
    Object.entries(dayData).forEach(([pid, entry])=>{
      if(!ids.includes(pid)) return;
      const statut = presenceStatut(entry);
      if(statut==="present") totalPresent++;
      else if(statut==="absent") totalAbsent++;
      else if(statut==="retard") totalRetard++;
    });
  });
  const totalPointages = totalPresent+totalAbsent+totalRetard;
  const tauxPresence = totalPointages? Math.round((totalPresent+totalRetard*0.5)/totalPointages*100) : 0;

  const congesMois = Object.values(DB.conges).filter(c=> ids.includes(c.personnelId) && c.dateDebut.startsWith(rapportMonth));
  const congesApprouves = congesMois.filter(c=>c.statut==="approuve").length;

      <h3>📈 Détail des pointages du mois</h3>
      <div class="list-item"><div class="li-main"><div class="li-name">Jours pointés</div></div><span class="badge actif">${joursComptes}</span></div>
      <div class="list-item"><div class="li-main"><div class="li-name">Présences</div></div><span class="badge present">${totalPresent}</span></div>
      <div class="list-item"><div class="li-main"><div class="li-name">Retards</div></div><span class="badge retard">${totalRetard}</span></div>
      <div class="list-item"><div class="li-main"><div class="li-name">Absences</div></div><span class="badge absent">${totalAbsent}</span></div>
    </div>

    <div class="card">
      <h3>👥 Détail par agent</h3>
      ${ids.length ? ids.map(id=>{
        const p = DB.personnel[id];
        let pr=0,ab=0,re=0;
        Object.entries(DB.presences).forEach(([date,dayData])=>{
          if(!date.startsWith(rapportMonth)) return;
          const s = presenceStatut(dayData[id]);
          if(s==="present") pr++; else if(s==="absent") ab++; else if(s==="retard") re++;
        });
        return `<div class="list-item">

/* ---------------------- 15. CLASSEMENT MÉRITE (activités + assiduité) ----------- */
let meriteMonth = todayISO().slice(0,7);

function calculerMerite(ids, month){
  return ids.map(id=>{
    const p = DB.personnel[id];
    // Assiduité
    let pr=0, re=0, ab=0, joursPointes=0;
    Object.entries(DB.presences).forEach(([date,dayData])=>{
      if(!date.startsWith(month)) return;
      const s = presenceStatut(dayData[id]);
      if(!s) return;
      joursPointes++;
      if(s==="present") pr++; else if(s==="retard") re++; else if(s==="absent") ab++;
    });
    const tauxAssiduite = joursPointes ? Math.round(((pr + re*0.5) / joursPointes) * 100) : 0;
    // Activités
    const actsAgent = Object.values(DB.activites).filter(a=>a.personnelId===id && a.date.startsWith(month));
    const nbActivites = actsAgent.length;
    const totalQuantite = actsAgent.reduce((s,a)=>s+(a.quantite||0),0);
    return { id, p, tauxAssiduite, nbActivites, totalQuantite, joursPointes };
  });
}

function renderMerite(){
  const ids = visiblePersonnelIds();
  const stats = calculerMerite(ids, meriteMonth);
  const maxActivites = Math.max(1, ...stats.map(s=>s.nbActivites));

  stats.forEach(s=>{
    const scoreActivite = (s.nbActivites / maxActivites) * 100;
    s.merite = Math.round(s.tauxAssiduite * 0.4 + scoreActivite * 0.6);
  });
  stats.sort((a,b)=> b.merite - a.merite);

  const recentActs = Object.entries(DB.activites)
    .filter(([id,a])=> ids.includes(a.personnelId) && a.date.startsWith(meriteMonth))
    .sort((a,b)=> (b[1].createdAt||0)-(a[1].createdAt||0))
    .slice(0,8);

  document.getElementById("content").innerHTML = `
    <div class="section-title">Classement mérite</div>
    <div class="section-sub">Activités réalisées + assiduité, par agent</div>
    <div class="field" style="margin-bottom:14px;">
      <span class="icon">🗓️</span>
      <input type="month" id="meriteMonthInput" value="${meriteMonth}" onchange="meriteMonth=this.value; renderMerite();">
    </div>

    <div class="card">
      <h3>🏅 Classement du mois</h3>
      ${stats.length ? stats.map((s,i)=>{
        const rankClass = i===0?"gold":i===1?"silver":i===2?"bronze":"";
        return `<div class="rank-item">
          <div class="rank-num ${rankClass}">${i+1}</div>
          <div class="avatar">${initials(s.p.nom,s.p.prenom)}</div>
          <div class="li-main">
            <div class="li-name">${s.p.prenom||""} ${s.p.nom||""}</div>
            <div class="li-sub">${s.nbActivites} activité${s.nbActivites>1?"s":""} · Assiduité ${s.tauxAssiduite}%</div>
          </div>
          <div class="rank-score">${s.merite}</div>
        </div>`;
      }).join("") : `<div class="empty-state"><div class="ic">🏅</div>Aucune donnée pour ce mois.</div>`}
    </div>

    <div class="card">
      <h3>📋 Activités récentes</h3>
      ${recentActs.length ? recentActs.map(([id,a])=>{
        const p = DB.personnel[a.personnelId] || {};
        return `<div class="act-row" onclick="openActiviteDetail('${id}')" style="cursor:pointer;">
          <div style="flex:1; min-width:0;">
            <div style="font-weight:700;">${p.prenom||""} ${p.nom||""} <span class="badge actif" style="margin-left:4px;">${a.domaine}</span></div>
            <div style="color:var(--texte-clair); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${a.description}</div>
          </div>
          <div style="color:var(--texte-clair); margin-left:8px;">${fmtDate(a.date)}</div>
        </div>`;
      }).join("") : `<div class="empty-state" style="padding:14px;"><div class="ic">📭</div>Aucune activité enregistrée.</div>`}
    </div>

    <div class="section-sub" style="text-align:center;">Score mérite = 40% assiduité + 60% volume d'activités (relatif au meilleur agent du mois)</div>
  `;
}
